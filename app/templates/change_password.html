{% extends "base.html" %}
{% block title %}Change Password — RELAY{% endblock %}
{% block content_auth %}

<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card">
      <div class="card-header navy d-flex align-items-center gap-2">
        <i class="bi bi-key-fill"></i> Change Password
      </div>
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('auth.change_password') }}">
          <div class="mb-3">
            <label class="form-label fw-semibold small">Current Password</label>
            <input type="password" name="current_password" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold small">New Password <span class="text-muted">(min 8 chars)</span></label>
            <input type="password" name="new_password" id="newpwd" class="form-control" required minlength="8">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold small">Confirm New Password</label>
            <input type="password" name="confirm_password" class="form-control" required minlength="8">
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-navy fw-semibold">
              <i class="bi bi-check2-circle me-1"></i>Update Password
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
